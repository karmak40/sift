name: sift
description: "Sift — a local-only document vault. Scan, organize, and track expiration dates for your important documents, with nothing leaving your device unless you choose to send it somewhere."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  drift: ^2.23.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  path: ^1.9.0
  path_provider: ^2.1.5
  package_info_plus: ^9.0.1
  file_picker: ^8.3.7
  uuid: ^4.5.1
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  open_filex: ^4.7.0
  local_auth: ^2.3.0
  crypto: ^3.0.3
  flutter_local_notifications: ^22.1.0
  timezone: ^0.11.1
  share_plus: ^12.0.2
  archive: ^4.0.7
  pdf: ^3.12.0
  cunning_document_scanner: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.23.0
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.3

# flutter_local_notifications_windows is an FFI plugin needing the ATL
# Visual Studio component (see local_packages/.../pubspec.yaml for why) —
# swapped for a no-op so Windows builds without it; Android/iOS still get
# the real plugin. See ARCHITECTURE.md, "Expiration reminders".
dependency_overrides:
  flutter_local_notifications_windows:
    path: local_packages/flutter_local_notifications_windows_stub

# Generates android/ + ios/ launcher icons from one source image — run
# `dart run flutter_launcher_icons` after changing anything here. Source
# images are the same accent-purple "S" mark used for the in-app logo (see
# home_shell.dart), rendered via test/tools/generate_app_icon.dart (not a
# real test — re-run it, then this command, if the brand mark ever changes).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_full.png"
  # Apple's App Store validation rejects the 1024x1024 marketing icon if it
  # has an alpha channel at all — even one where every pixel is fully
  # opaque (255), which is all icon_full.png actually has. Strip it here
  # rather than trying to produce an alpha-free PNG from the generator.
  remove_alpha_ios: true
  adaptive_icon_background: "#5841C8"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icon/icon_full.png"
    icon_size: 256 # max allowed — best quality across title bar/taskbar/Explorer

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # The in-app Settings > About > Privacy Policy screen renders this file
  # directly (see lib/ui/settings/privacy_policy_screen.dart) so the
  # in-app text and the repo's PRIVACY.md can never drift out of sync.
  assets:
    - PRIVACY.md

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Bundled locally rather than fetched at runtime via the google_fonts
  # package — an app that markets itself as local-only/private shouldn't
  # make a network call just to render text, and this also means the UI
  # renders correctly the very first time the app is opened with no
  # internet connection. See lib/ui/theme.dart and ARCHITECTURE.md.
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
